# ===============================
# PERFIL DE TEST
# ===============================

spring.application.name=marymar-test

# ===============================
# BASE DE DATOS PARA TESTS (H2)
# ===============================

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ===============================
# JWT
# ===============================

jwt.secret=test_jwt_secret_key_123456789

# ===============================
# CLOUDINARY (VALORES FAKE)
# ===============================

cloudinary.cloud_name=test
cloudinary.api_key=test
cloudinary.api_secret=test

# ===============================
# BREVO EMAIL (VALORES FAKE)
# ===============================

brevo.api.key=test

# ===============================
# MAIL (DESACTIVADO PARA TEST)
# ===============================

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ===============================
# GOOGLE OAUTH (FAKE)
# ===============================

spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/test

# ===============================
# CAPTCHA
# ===============================

recaptcha.secret=${CAPTCHA_KEY}
app.frontend.url=http://localhost:4200
app.mobile.redirect-uri=marymar://oauth-callback
recaptcha.site-key=test-site-key